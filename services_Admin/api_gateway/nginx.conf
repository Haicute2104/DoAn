events {}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Rate limiting: 200 req/phút mỗi IP (≈ 3.33 req/s)
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=200r/m;
    limit_req_status 429;

    # Cho phép upload file ảnh tối đa 20MB
    client_max_body_size 20m;

    # --- UPSTREAM DEFINITIONS ---
    upstream auth {
        server auth:5000;
    }
    upstream share {
        server share:5001;
    }
    upstream user {
        server user:5002;
    }
    upstream products {
        server products:5003;
    }
    upstream order {
        server order:5004;
    }
    upstream cart {
        server cart:5005;
    }
    upstream contact {
        server contact:5010;
    }
    upstream payment {
        server payment:5006;
    }
    upstream news {
        server news:5011;
    }
    upstream ai {
        server ai:5012;
    }
    upstream report {
        server report:5014;
    }

    server {
        listen 80;
        server_name localhost;
        set $user_upstream http://user:5002;

        # Áp dụng rate limit cho toàn bộ server (burst=50 để cho phép burst ngắn hạn)
        limit_req zone=per_ip burst=50 nodelay;

        # =============================================================
        # CORS snippet (reused via copy — nginx doesn't support macros)
        # =============================================================

        # =========================================================
        # 1. AUTH SERVICE (Admin only)
        # =========================================================
        location /api/admin/auth {
            proxy_hide_header 'Access-Control-Allow-Origin';
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            rewrite ^/api/admin/auth(.*)$ /api/v1/admin/auth$1 break;
            proxy_pass http://auth;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 1.2 Auth — Client (shared routes for client frontend)
        location /api/client/auth {
            proxy_hide_header 'Access-Control-Allow-Origin';
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            rewrite ^/api/client/auth(.*)$ /api/v1/client/auth$1 break;
            proxy_pass http://auth;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
